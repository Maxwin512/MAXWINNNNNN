<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личные финансы v1.0</title>
    <style>
        :root { --bg: #f0f2f5; --fg: #000000; --card: #ffffff; --primary: #007bff; --danger: #dc3545; }
        .dark { --bg: #1c1c1e; --fg: #ffffff; --card: #2c2c2e; --primary: #0a84ff; --danger: #ff453a; }
        body { font-family: Arial, sans-serif; background: var(--bg); color: var(--fg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 90vh; transition: 0.3s; }
        .card { background: var(--card); padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        .main-screen { width: 800px; display: none; background: var(--card); padding: 20px; border-radius: 8px; }
        input, select { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; background: var(--card); color: var(--fg); }
        button { width: 95%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin: 5px 0; }
        button.danger { background: var(--danger); }
        .error { color: red; font-size: 14px; margin: 5px 0; font-weight: bold; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        .tabs { display: flex; margin: 15px 0; border-bottom: 1px solid #ccc; }
        .tab { padding: 10px 20px; cursor: pointer; border: 1px solid transparent; }
        .tab.active { border: 1px solid #ccc; border-bottom: 1px solid var(--card); font-weight: bold; }
        .tab-content { display: none; padding: 15px 0; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    </style>
</head>
<body>

    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="auth-screen" class="card">
        <h2>Вход в систему</h2>
        <input type="text" id="login-user" value="admin" placeholder="Логин"><br>
        <input type="password" id="login-pass" value="Admin123!" placeholder="Пароль"><br>
        <div id="login-error" class="error"></div>
        <button onclick="tryLogin()">Войти</button>
        <button style="background:#6c757d;" onclick="switchScreen('reg-screen')">Регистрация</button>
        <p style="font-size:12px; color:#666;">Дефолтный admin: admin / Admin123!</p>
    </div>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="reg-screen" class="card" style="display:none;">
        <h2>Регистрация аккаунта</h2>
        <input type="text" id="reg-user" placeholder="Придумайте логин"><br>
        <input type="password" id="reg-pass" placeholder="Придумайте пароль"><br>
        <input type="password" id="reg-confirm" placeholder="Повторите пароль"><br>
        <input type="text" id="reg-email" placeholder="Ваш Email"><br>
        <input type="text" id="reg-curr" placeholder="Учетная валюта (напр. RUB)"><br>
        <div id="reg-error" class="error"></div>
        <button onclick="tryRegister()">Зарегистрироваться</button>
        <button style="background:#6c757d;" onclick="switchScreen('auth-screen')">Назад</button>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН ПРИЛОЖЕНИЯ -->
    <div id="main-screen" class="main-screen">
        <div class="header">
            <h3 id="welcome-msg">Привет!</h3>
            <div>
                <label><input type="checkbox" id="theme-toggle" onclick="toggleTheme()" style="width:auto;"> Тёмная тема</label>
                <button class="danger" onclick="logout()" style="width:auto; padding: 5px 15px; margin-left:15px;">Выйти</button>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab(event, 'tab-dash')">Сводка</div>
            <div class="tab" onclick="switchTab(event, 'tab-acc')">Счета</div>
            <div class="tab" onclick="switchTab(event, 'tab-tx')">Операции</div>
        </div>

        <div id="tab-dash" class="tab-content active">
            <h4>Статистика системы личных финансов</h4>
            <p id="stat-text">Загрузка данных...</p>
        </div>

        <div id="tab-acc" class="tab-content">
            <h4>Управление счетами (CRUD)</h4>
            <button onclick="addAccount()" style="width:auto; padding:5px 15px;">+ Добавить счет</button>
            <table>
                <thead><tr><th>ID</th><th>Название счета</th><th>Баланс</th><th>Действия</th></tr></thead>
                <tbody id="accounts-table"></tbody>
            </table>
        </div>

        <div id="tab-tx" class="tab-content">
            <h4>История операций (CRUD)</h4>
            <button onclick="addTransaction()" style="width:auto; padding:5px 15px;">+ Добавить операцию</button>
            <button onclick="exportCSV()" style="width:auto; padding:5px 15px; background:#28a745;">Экспорт в CSV</button>
            <table>
                <thead><tr><th>ID</th><th>Счет</th><th>Сумма</th><th>Дата</th><th>Действия</th></tr></thead>
                <tbody id="transactions-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        // ИНИЦИАЛИЗАЦИЯ ДАННЫХ ПО УМОЛЧАНИЮ
        if(!localStorage.getItem('users')) {
            localStorage.setItem('users', JSON.stringify([
                {id: 1, username: 'admin', password: 'Admin123!', email: 'admin@finance.com', role: 'admin', currency: 'RUB'}
            ]));
            localStorage.setItem('accounts', JSON.stringify([
                {id: 1, user_id: 1, name: 'Основной картсчет', balance: 55000}
            ]));
            localStorage.setItem('transactions', JSON.stringify([
                {id: 1, user_id: 1, account: 'Основной картсчет', amount: -1200, date: '2026-06-05'}
            ]));
        }

        let currentUser = null;
        let loginAttempts = 0;
        let lockUntil = 0;

        // ТЕМНАЯ ТЕМА
        if(localStorage.getItem('dark-theme') === 'true') {
            document.body.classList.add('dark');
            setTimeout(() => {
                let t = document.getElementById('theme-toggle');
                if(t) t.checked = true;
            }, 100);
        }

        // ========== ВАЛИДАЦИЯ EMAIL ПО ТЗ ==========
        // ВНИМАНИЕ! ТРЕБОВАНИЕ ИЗ ТЗ:
        // фильтровать email, содержащие подстроку "admin" после символа @
        // Даже если это противоречит здравому смыслу - это условие задачи!
        function validateEmailBySpec(email) {
            if (!email || typeof email !== 'string') return { valid: false, message: "Email не может быть пустым" };
            
            let trimmed = email.trim();
            let atIndex = trimmed.indexOf('@');
            
            // Проверка наличия @
            if (atIndex === -1) {
                return { valid: false, message: "Email должен содержать символ @" };
            }
            
            let localPart = trimmed.substring(0, atIndex);
            let domainPart = trimmed.substring(atIndex + 1);
            
            // ПРОВЕРКА НА "admin" ПОСЛЕ @ (ТРЕБОВАНИЕ ИЗ ТЗ)
            if (domainPart.includes('admin')) {
                return { valid: false, message: "Email-адреса, содержащие 'admin' в доменной части, запрещены" };
            }
            
            // Стандартная проверка формата email
            if (localPart.length === 0) {
                return { valid: false, message: "Локальная часть email не может быть пустой" };
            }
            
            if (domainPart.length === 0 || !domainPart.includes('.')) {
                return { valid: false, message: "Доменная часть email должна содержать точку" };
            }
            
            let localRegex = /^[a-zA-Z0-9_.+-]+$/;
            if (!localRegex.test(localPart)) {
                return { valid: false, message: "Локальная часть email содержит недопустимые символы" };
            }
            
            let domainRegex = /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/;
            if (!domainRegex.test(domainPart)) {
                return { valid: false, message: "Некорректный формат доменной части email" };
            }
            
            return { valid: true, message: "OK" };
        }

        function switchScreen(screenId) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('reg-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById(screenId).style.display = 'block';
        }

        function switchTab(evt, tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            evt.currentTarget.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            updateData();
        }

        function toggleTheme() {
            let isDark = document.body.classList.toggle('dark');
            localStorage.setItem('dark-theme', isDark);
        }

        function tryLogin() {
            if(Date.now() < lockUntil) {
                let rem = Math.ceil((lockUntil - Date.now()) / 1000);
                document.getElementById('login-error').innerText = `Система заблокирована. Подождите ${rem} сек.`;
                return;
            }
            let u = document.getElementById('login-user').value.trim();
            let p = document.getElementById('login-pass').value;
            let users = JSON.parse(localStorage.getItem('users'));
            let found = users.find(x => x.username === u && x.password === p);

            if(found) {
                currentUser = found;
                loginAttempts = 0;
                document.getElementById('welcome-msg').innerHTML = `Привет, ${currentUser.username} [${currentUser.role}] | Валюта: ${currentUser.currency}`;
                switchScreen('main-screen');
                updateData();
                logAction(`Вход в систему`);
            } else {
                loginAttempts++;
                if(loginAttempts >= 3) {
                    lockUntil = Date.now() + 30000;
                    document.getElementById('login-error').innerText = "Превышено 3 попытки! Блокировка на 30 сек.";
                } else {
                    document.getElementById('login-error').innerText = `Неверный логин или пароль. Попыток: ${loginAttempts}/3`;
                }
            }
        }

        function tryRegister() {
            let u = document.getElementById('reg-user').value.trim();
            let p = document.getElementById('reg-pass').value;
            let conf = document.getElementById('reg-confirm').value;
            let email = document.getElementById('reg-email').value.trim();
            let curr = document.getElementById('reg-curr').value.trim();
            let errDiv = document.getElementById('reg-error');

            // Проверка заполнения полей
            if(!u || !p || !email || !curr) {
                errDiv.innerText = "Заполните все поля!";
                return;
            }
            
            // Проверка совпадения паролей
            if(p !== conf) {
                errDiv.innerText = "Пароли не совпадают!";
                return;
            }
            
            // Проверка сложности пароля
            if(p.length < 8 || !/[A-Z]/.test(p) || !/[0-9]/.test(p)) {
                errDiv.innerText = "Пароль должен быть не менее 8 символов, содержать заглавную букву и цифру!";
                return;
            }
            
            // ВАЖНО: ВАЛИДАЦИЯ EMAIL ПО ТЗ (с фильтрацией admin в домене)
            let emailCheck = validateEmailBySpec(email);
            if(!emailCheck.valid) {
                errDiv.innerText = emailCheck.message;
                return;
            }
            
            // Проверка уникальности логина
            let users = JSON.parse(localStorage.getItem('users'));
            if(users.find(x => x.username === u)) {
                errDiv.innerText = "Логин уже занят!";
                return;
            }
            
            // Проверка уникальности email
            if(users.find(x => x.email === email)) {
                errDiv.innerText = "Email уже зарегистрирован!";
                return;
            }
            
            // Создание нового пользователя
            let newId = users.length > 0 ? Math.max(...users.map(u => u.id)) + 1 : 1;
            users.push({
                id: newId,
                username: u,
                password: p,
                email: email,
                role: 'user',
                currency: curr.toUpperCase()
            });
            localStorage.setItem('users', JSON.stringify(users));
            
            alert("Регистрация успешна! Теперь можно войти.");
            switchScreen('auth-screen');
            
            // Очистка формы
            document.getElementById('reg-user').value = '';
            document.getElementById('reg-pass').value = '';
            document.getElementById('reg-confirm').value = '';
            document.getElementById('reg-email').value = '';
            document.getElementById('reg-curr').value = '';
            document.getElementById('reg-error').innerText = '';
        }

        function updateData() {
            let accs = JSON.parse(localStorage.getItem('accounts')) || [];
            let txns = JSON.parse(localStorage.getItem('transactions')) || [];
            
            // Фильтрация по текущему пользователю
            let userAccs = accs.filter(a => a.user_id === currentUser.id);
            let userTxns = txns.filter(t => t.user_id === currentUser.id);
            
            // Отрисовка таблицы счетов
            let accountsHtml = '';
            userAccs.forEach(acc => {
                accountsHtml += `
                    <tr>
                        <td>${acc.id}</td>
                        <td>${escapeHtml(acc.name)}</td>
                        <td>${acc.balance.toFixed(2)} ${currentUser.currency}</td>
                        <td>
                            <button onclick="editAccount(${acc.id})" style="width:auto; padding:2px 8px;">✏️</button>
                            <button class="danger" onclick="deleteAccount(${acc.id})" style="width:auto; padding:2px 8px;">🗑️</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('accounts-table').innerHTML = accountsHtml || '<tr><td colspan="4">Нет счетов</td></tr>';
            
            // Отрисовка таблицы операций
            let txnsHtml = '';
            userTxns.forEach(tx => {
                let amountClass = tx.amount < 0 ? 'style="color:red"' : 'style="color:green"';
                txnsHtml += `
                    <tr>
                        <td>${tx.id}</td>
                        <td>${escapeHtml(tx.account)}</td>
                        <td ${amountClass}>${tx.amount > 0 ? '+' : ''}${tx.amount.toFixed(2)} ${currentUser.currency}</td>
                        <td>${tx.date}</td>
                        <td>
                            <button onclick="editTransaction(${tx.id})" style="width:auto; padding:2px 8px;">✏️</button>
                            <button class="danger" onclick="deleteTransaction(${tx.id})" style="width:auto; padding:2px 8px;">🗑️</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('transactions-table').innerHTML = txnsHtml || '<tr><td colspan="5">Нет операций</td></tr>';
            
            // Статистика
            let totalBalance = userAccs.reduce((sum, a) => sum + a.balance, 0);
            let totalIncome = userTxns.filter(t => t.amount > 0).reduce((sum, t) => sum + t.amount, 0);
            let totalExpense = userTxns.filter(t => t.amount < 0).reduce((sum, t) => sum + t.amount, 0);
            
            document.getElementById('stat-text').innerHTML = `
                <strong>Общий баланс:</strong> ${totalBalance.toFixed(2)} ${currentUser.currency}<br>
                <strong>Доходы:</strong> <span style="color:green">+${totalIncome.toFixed(2)}</span> ${currentUser.currency}<br>
                <strong>Расходы:</strong> <span style="color:red">${totalExpense.toFixed(2)}</span> ${currentUser.currency}<br>
                <strong>Количество счетов:</strong> ${userAccs.length}<br>
                <strong>Количество операций:</strong> ${userTxns.length}
            `;
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        function logAction(action) {
            let logs = JSON.parse(localStorage.getItem('action_logs')) || [];
            logs.push({
                timestamp: new Date().toISOString(),
                user: currentUser.username,
                action: action
            });
            localStorage.setItem('action_logs', JSON.stringify(logs));
        }
        
        // CRUD СЧЕТОВ
        function addAccount() {
            let name = prompt("Введите название счета:");
            if(!name || name.trim() === "") return;
            
            let balance = parseFloat(prompt("Введите начальный баланс:", "0"));
            if(isNaN(balance)) balance = 0;
            
            let accs = JSON.parse(localStorage.getItem('accounts')) || [];
            let newId = accs.length > 0 ? Math.max(...accs.map(a => a.id)) + 1 : 1;
            
            accs.push({
                id: newId,
                user_id: currentUser.id,
                name: name.trim(),
                balance: balance
            });
            
            localStorage.setItem('accounts', JSON.stringify(accs));
            updateData();
            logAction(`Добавлен счет "${name}" на сумму ${balance}`);
        }
        
        function editAccount(id) {
            let accs = JSON.parse(localStorage.getItem('accounts')) || [];
            let accIndex = accs.findIndex(a => a.id === id && a.user_id === currentUser.id);
            if(accIndex === -1) { alert("Счет не найден!"); return; }
            
            let newName = prompt("Новое название счета:", accs[accIndex].name);
            if(newName && newName.trim() !== "") accs[accIndex].name = newName.trim();
            
            let newBalance = parseFloat(prompt("Новый баланс:", accs[accIndex].balance));
            if(!isNaN(newBalance)) accs[accIndex].balance = newBalance;
            
            localStorage.setItem('accounts', JSON.stringify(accs));
            updateData();
            logAction(`Отредактирован счет ID:${id}`);
        }
        
        function deleteAccount(id) {
            // ДИАЛОГ ПОДТВЕРЖДЕНИЯ С ТЕКСТОМ ПРО КОТИКОВ
            if(confirm("Вы уверены? 🐱 Котики расстроятся, если данные исчезнут навсегда! 🐱")) {
                let accs = JSON.parse(localStorage.getItem('accounts')) || [];
                let filtered = accs.filter(a => !(a.id === id && a.user_id === currentUser.id));
                localStorage.setItem('accounts', JSON.stringify(filtered));
                updateData();
                logAction(`Удален счет ID:${id}`);
            }
        }
        
        // CRUD ОПЕРАЦИЙ
        function addTransaction() {
            let accs = JSON.parse(localStorage.getItem('accounts')) || [];
            let userAccs = accs.filter(a => a.user_id === currentUser.id);
            
            if(userAccs.length === 0) {
                alert("Сначала создайте счет!");
                return;
            }
            
            let accountNames = userAccs.map(a => a.name).join(", ");
            let account = prompt(`Выберите счет из: ${accountNames}`);
            if(!account) return;
            
            let targetAcc = userAccs.find(a => a.name === account);
            if(!targetAcc) {
                alert("Счет не найден!");
                return;
            }
            
            let amount = parseFloat(prompt("Сумма (положительная - доход, отрицательная - расход):"));
            if(isNaN(amount)) return;
            
            let date = prompt("Дата (ГГГГ-ММ-ДД):", new Date().toISOString().slice(0,10));
            if(!date) return;
            
            let txns = JSON.parse(localStorage.getItem('transactions')) || [];
            let newId = txns.length > 0 ? Math.max(...txns.map(t => t.id)) + 1 : 1;
            
            txns.push({
                id: newId,
                user_id: currentUser.id,
                account: account,
                amount: amount,
                date: date
            });
            
            // Обновление баланса счета
            targetAcc.balance += amount;
            localStorage.setItem('accounts', JSON.stringify(accs));
            localStorage.setItem('transactions', JSON.stringify(txns));
            
            updateData();
            logAction(`Добавлена операция на сумму ${amount} на счет "${account}"`);
        }
        
        function editTransaction(id) {
            let txns = JSON.parse(localStorage.getItem('transactions')) || [];
            let txnIndex = txns.findIndex(t => t.id === id && t.user_id === currentUser.id);
            if(txnIndex === -1) { alert("Операция не найдена!"); return; }
            
            let newAmount = parseFloat(prompt("Новая сумма:", txns[txnIndex].amount));
            if(!isNaN(newAmount)) {
                // Корректировка баланса счета
                let accs = JSON.parse(localStorage.getItem('accounts')) || [];
                let acc = accs.find(a => a.user_id === currentUser.id && a.name === txns[txnIndex].account);
                if(acc) {
                    acc.balance = acc.balance - txns[txnIndex].amount + newAmount;
                    localStorage.setItem('accounts', JSON.stringify(accs));
                }
                txns[txnIndex].amount = newAmount;
            }
            
            let newDate = prompt("Новая дата (ГГГГ-ММ-ДД):", txns[txnIndex].date);
            if(newDate) txns[txnIndex].date = newDate;
            
            localStorage.setItem('transactions', JSON.stringify(txns));
            updateData();
            logAction(`Отредактирована операция ID:${id}`);
        }
        
        function deleteTransaction(id) {
            // ДИАЛОГ ПОДТВЕРЖДЕНИЯ С ТЕКСТОМ ПРО КОТИКОВ
            if(confirm("Удалить операцию? 🐱 Котики будут грустить, но вы уверены? 🐱")) {
                let txns = JSON.parse(localStorage.getItem('transactions')) || [];
                let txnToDelete = txns.find(t => t.id === id && t.user_id === currentUser.id);
                
                // Возврат баланса на счет
                if(txnToDelete) {
                    let accs = JSON.parse(localStorage.getItem('accounts')) || [];
                    let acc = accs.find(a => a.user_id === currentUser.id && a.name === txnToDelete.account);
                    if(acc) {
                        acc.balance -= txnToDelete.amount;
                        localStorage.setItem('accounts', JSON.stringify(accs));
                    }
                }
                
                let filtered = txns.filter(t => !(t.id === id && t.user_id === currentUser.id));
                localStorage.setItem('transactions', JSON.stringify(filtered));
                updateData();
                logAction(`Удалена операция ID:${id}`);
            }
        }
        
        // ЭКСПОРТ CSV
        function exportCSV() {
            let txns = JSON.parse(localStorage.getItem('transactions')) || [];
            let userTxns = txns.filter(t => t.user_id === currentUser.id);
            
            let csvRows = [["ID", "Счет", "Сумма", "Дата"]];
            userTxns.forEach(t => {
                csvRows.push([t.id, t.account, t.amount, t.date]);
            });
            
            let csvContent = csvRows.map(row => row.join(",")).join("\n");
            let blob = new Blob(["\uFEFF" + csvContent], {type: "text/csv;charset=utf-8;"});
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `operations_${currentUser.username}_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
            
            logAction(`Экспорт операций в CSV`);
            alert("CSV экспортирован!");
        }
        
        function logout() {
            currentUser = null;
            switchScreen('auth-screen');
            document.getElementById('login-user').value = '';
            document.getElementById('login-pass').value = '';
